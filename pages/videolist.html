<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Video List</title>
    <link rel="stylesheet" href="assets/css/style.css" type="text/css" />
  </head>
  <body>
    <div
      class="table-container"
      id="videoListContainer"
      style="max-height: calc(100dvh - 375px)"
    >
      <table class="table table--videolist" id="videoTable">
        <thead>
          <tr>
            <th scope="col" class="col-thumb"></th>
            <th scope="col" class="col-title" data-type="string">
              Video Title (Click to view video song list)
            </th>
            <th
              scope="col"
              data-type="date"
              class="col-date sorted-desc"
              style="text-align: center"
            >
              Date Aired
            </th>
            <th
              scope="col"
              class="col-songs"
              data-type="number"
              style="text-align: center"
            >
              # of Songs
            </th>
            <th
              scope="col"
              class="col-link"
              data-type="string"
              style="text-align: center"
            >
              Video Link
            </th>
          </tr>
        </thead>
        <tbody id="videolist">
          <tr>
            <td colspan="5">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="assets/js/videolist.js"></script>
  </body>
</html>
