<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Video List</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body style="padding: 1.25rem">
    <div class="table-wrap">
      <table class="table" id="videoTable">
        <colgroup>
          <col width="67px" />
          <col style="min-width: 150px" />
          <col width="140px" />
          <col width="140px" />
          <col width="120px" />
        </colgroup>
        <thead>
          <tr>
            <th scope="col" colspan="2" data-type="string">
              Video Title (Click to view video song list)
            </th>
            <th scope="col" data-type="date" class="sorted-desc" style="text-align: center;">Date Aired</th>
            <th scope="col" data-type="number" style="text-align: center;"># of Songs</th>
            <th scope="col" data-type="string" style="text-align: center;">Video Link</th>
          </tr>
        </thead>
        <tbody id="videolist">
          <tr>
            <td colspan="5">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="../assets/js/videolist.js"></script>
  </body>
</html>
