<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Video</title>
    <link rel="stylesheet" href="assets/css/style.css" type="text/css" />
  </head>
  <body>
    <div id="video-container">
      <div class="video-item">
        <h3 id="video-title" class="video-title"></h3>
        <div class="video-body">
          <div id="video-thumbnail" class="video-thumb"></div>
          <div class="video-info">
            <div class="video-info-stats">
              <div><strong>Date Aired:</strong> <span id="video-date"></span></div>
              <div><strong># of Songs:</strong> <span id="video-songs-count"></span></div>
            </div>
            <div class="video-info-actions">
              <button id="video-link-btn" class="btn btn--outline">Watch Video</button>
              <button id="desc-link-btn" class="btn btn--outline">View Description</button>
            </div>
          </div>
        </div>
      </div>
      <div class="table-container" style="max-height: calc(100vh - 576px)">
        <div class="song-list">
          <table class="table table--search" id="songTable">
            <thead>
              <tr>
                <th scope="col" class="col-song" data-type="string">Song / Artist</th>
                <th scope="col" class="col-link" style="text-align: center">
                  Link to Watch
                </th>
              </tr>
            </thead>
            <tbody id="song-list-body"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="assets/js/video.js"></script>
    <div id="description-modal" style="display: none">
      <div id="description-overlay"></div>
      <div id="description-box">
        <div id="description-header">
          <strong>Video Description</strong>
          <button id="description-close">✕</button>
        </div>
        <div id="description-body"></div>
      </div>
    </div>
  </body>
</html>
